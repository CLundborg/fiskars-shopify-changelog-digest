name: Daily Shopify changelog digest

on:
  schedule:
    # Goal: post once per weekday morning, Europe/Copenhagen, year-round.
    # GitHub Actions cron is UTC-only AND can be delayed by hours under load,
    # so we list both "summer" and "winter" morning slots and let whichever
    # fires first do the post. The script's --once-per-day flag records the
    # Copenhagen date of the post in state, so the later run becomes a no-op.
    - cron: "30 6 * * 1-5"   # 08:30 CEST (summer) / 07:30 CET (winter)
    - cron: "30 7 * * 1-5"   # 09:30 CEST (summer) / 08:30 CET (winter)
  # Allow manual triggering from the Actions tab for testing / ad-hoc runs.
  # Manual runs are NOT subject to the once-per-day gate — they always post.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Post digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            node dist/digest.js --once-per-day
          else
            node dist/digest.js
          fi

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update digest state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
